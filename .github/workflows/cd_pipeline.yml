name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy_dev:
    runs-on: ubuntu-latest
    environment: DEV
    
    # ✅ ADD THIS - Secrets for DEV
    env:
      ENV: DEV
      STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
      STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
      DATABRICKS_URL: ${{ secrets.DATABRICKS_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to DEV
      run: |
        echo "========================================="
        echo "🚀 DEPLOYING TO DEV ENVIRONMENT"
        echo "========================================="
        echo "Environment: $ENV"
        echo "Storage Account: $STORAGE_ACCOUNT"
        echo "Databricks URL: $DATABRICKS_URL"
        echo "✅ DEV Deployment complete!"
        echo "========================================="
    
    - name: Run Bronze Notebook in DEV
      run: |
        echo "📓 Running bronze notebook in DEV..."
        # Add Databricks CLI command here if needed
        echo "✅ Bronze layer complete"

  deploy_test:
    runs-on: ubuntu-latest
    environment: TEST
    needs: deploy_dev
    
    env:
      ENV: TEST
      STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
      STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
      DATABRICKS_URL: ${{ secrets.DATABRICKS_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to TEST
      run: |
        echo "========================================="
        echo "🧪 DEPLOYING TO TEST ENVIRONMENT"
        echo "========================================="
        echo "Environment: $ENV"
        echo "Running integration tests..."
        echo "Validating data quality..."
        echo "✅ TEST Deployment complete!"
        echo "========================================="

  deploy_prod:
    runs-on: ubuntu-latest
    environment: PROD
    needs: deploy_test
    
    env:
      ENV: PROD
      STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
      STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
      DATABRICKS_URL: ${{ secrets.DATABRICKS_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to PROD
      run: |
        echo "========================================="
        echo "🏭 DEPLOYING TO PROD ENVIRONMENT"
        echo "========================================="
        echo "Environment: $ENV"
        echo "Manual approval gate passed ✅"
        echo "Writing audit log..."
        echo "✅ PROD Deployment complete!"
        echo "========================================="
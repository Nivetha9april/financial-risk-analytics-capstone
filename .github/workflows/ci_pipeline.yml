name: CI Pipeline

on:
  push:
    branches: [ dev, test, main ]
  pull_request:
    branches: [ main ]

jobs:
  ci_checks:
    runs-on: ubuntu-latest
    
    env:
      STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
      STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
      DATABRICKS_URL: ${{ secrets.DATABRICKS_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Dependencies
      run: |
        pip install pyflakes pytest
    
    - name: Check Notebook Syntax
      run: |
        echo "Checking notebook syntax..."
        for f in notebooks/*.py; do
          python -m pyflakes "$f" && echo "✅ $f" || echo "❌ $f failed"
        done
    
    - name: Validate DAG
      run: |
        echo "Validating DAG..."
        python -c "import ast; ast.parse(open('dags/financial_pipeline_dag.py').read())"
        echo "✅ DAG valid"
    
    - name: Check Config Files
      run: |
        echo "========================================="
        echo "Checking Config Files"
        echo "========================================="
        echo "Current directory: $(pwd)"
        echo ""
        echo "Listing all files and folders:"
        ls -la
        echo ""
        echo "Checking config folder:"
        if [ -d "config" ]; then
          echo "✅ config folder exists"
          echo "Contents of config folder:"
          ls -la config/
        else
          echo "❌ config folder NOT found"
        fi
        echo ""
        echo "Testing each config file:"
        if [ -f "config/dev.env" ]; then
          echo "✅ dev.env exists"
          cat config/dev.env
        else
          echo "❌ dev.env NOT FOUND"
        fi
        if [ -f "config/test.env" ]; then
          echo "✅ test.env exists"
        else
          echo "❌ test.env NOT FOUND"
        fi
        if [ -f "config/prod.env" ]; then
          echo "✅ prod.env exists"
        else
          echo "❌ prod.env NOT FOUND"
        fi
        echo "========================================="
    
    - name: Verify Secrets Available
      run: |
        echo "========================================="
        echo "Verifying GitHub Secrets are available:"
        if [ -n "$STORAGE_ACCESS_KEY" ]; then
          echo "✅ STORAGE_ACCESS_KEY is set (length: ${#STORAGE_ACCESS_KEY})"
        else
          echo "❌ STORAGE_ACCESS_KEY NOT set"
        fi
        if [ -n "$DATABRICKS_TOKEN" ]; then
          echo "✅ DATABRICKS_TOKEN is set (length: ${#DATABRICKS_TOKEN})"
        else
          echo "❌ DATABRICKS_TOKEN NOT set"
        fi
        echo "========================================="
    
    - name: CI Summary
      run: |
        echo "========================================="
        echo "✅ CI PIPELINE PASSED!"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "========================================="